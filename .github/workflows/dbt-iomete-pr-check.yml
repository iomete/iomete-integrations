name: PR Check for dbt-iomete

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'dbt-iomete/**'
      - '.github/workflows/dbt-iomete-pr-check.yml'
      - '.github/actions/dbt-iomete-setup/action.yml'
  workflow_call:

defaults:
  run:
    working-directory: dbt-iomete

env:
  DBT_IOMETE_HOST: release.iomete.cloud
  DBT_IOMETE_PORT: "443"
  DBT_IOMETE_HTTPS: "true"
  DBT_IOMETE_DOMAIN: default
  DBT_IOMETE_DATAPLANE: spark-resources-1

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/dbt-iomete-setup

      - name: Run unit tests
        run: tox -e unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    env:
      DBT_IOMETE_ADMIN_TOKEN: ${{ secrets.DBT_IOMETE_ADMIN_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/dbt-iomete-setup

      - name: Run integration tests
        run: SUITES=integration bash scripts/ci/run-integration-tests.sh

  functional:
    runs-on: ubuntu-latest
    needs: unit
    env:
      DBT_IOMETE_ADMIN_TOKEN: ${{ secrets.DBT_IOMETE_ADMIN_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/dbt-iomete-setup

      - name: Run functional tests
        run: SUITES=functional bash scripts/ci/run-integration-tests.sh
