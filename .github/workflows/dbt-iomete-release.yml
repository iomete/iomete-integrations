name: RELEASE for dbt-iomete

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: dbt-iomete

jobs:
  test:
    uses: ./.github/workflows/dbt-iomete-pr-check.yml
    secrets: inherit

  package-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the release tag.
    env:
      PYPI_TOKEN: '${{ secrets.PYPI_TOKEN }}'
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/dbt-iomete-setup

      - name: Extract version from source
        id: extract_version
        shell: bash
        run: |
          # Single source of truth for the released version.
          NEW_VERSION=$(grep -E '^version' dbt/adapters/iomete/__version__.py | cut -d '"' -f2)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=dbt-iomete-v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${NEW_VERSION}"

      - name: Ensure tag does not already exist
        # Guards against re-publishing a version that wasn't bumped.
        shell: bash
        env:
          TAG: '${{ steps.extract_version.outputs.tag }}'
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump the version in dbt/adapters/iomete/__version__.py before releasing."
            exit 1
          fi
          echo "Tag ${TAG} is free."

      - name: Clean up dist
        run: rm -rf dist/

      - name: Create distribution
        run: python setup.py sdist

      - name: Detect if dist/ is empty
        # Pushing packages from empty directory raises an error in actions, detect if empty first
        id: check_dist
        shell: bash
        run: |
          if [[ $(ls -A "dist/" | wc -l) -ne 0 ]]
            then
              echo 'not empty' && echo "not_empty='true'" >> $GITHUB_OUTPUT
            else
              echo 'empty' && echo "not_empty='false'" >> $GITHUB_OUTPUT
          fi

      - name: Publish packages
        if: ( success() && contains(steps.check_dist.outputs.not_empty, 'true') )
        run: twine upload -u __token__ -p "$PYPI_TOKEN" dist/*

      - name: Create and push release tag
        if: ( success() && contains(steps.check_dist.outputs.not_empty, 'true') )
        shell: bash
        env:
          TAG: '${{ steps.extract_version.outputs.tag }}'
        run: |
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Trigger post-release workflow
        # This will check if newly published packages can be pip installed in clean environments
        if: ( success() && contains(steps.check_dist.outputs.not_empty, 'true') )
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.API_TOKEN }}
          repository: ${{ github.repository }}
          event-type: post-release
          client-payload: '{"version": "${{ steps.extract_version.outputs.new_version }}"}'
