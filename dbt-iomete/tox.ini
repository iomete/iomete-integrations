[tox]
skipsdist = True
envlist = unit

[pytest]
# Local dev: auto-load credentials from a .env file if present (pytest-dotenv).
# CI passes the same vars via the job env; those take precedence (no override)
# and a missing .env is a no-op, so this works in both places.
env_files = .env
env_override_existing_values = 0

[testenv:unit]
basepython = python
allowlist_externals = /bin/bash
commands = /bin/bash -c '{envpython} -m pytest -v {posargs} tests/unit'
passenv = DBT_*,PYTEST_ADDOPTS
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/dev-requirements.txt

[testenv:integration-iomete]
basepython = python
allowlist_externals = /bin/bash
commands = /bin/bash -c '{envpython} -m pytest -v {posargs} -n20 tests/integration/*'
passenv = DBT_*,PYTEST_ADDOPTS
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/dev-requirements.txt
    -e.

[testenv:functional]
basepython = python
allowlist_externals = /bin/bash
commands = /bin/bash -c '{envpython} -m pytest -v {posargs} -n20 tests/functional/*'
passenv = DBT_*,PYTEST_ADDOPTS
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/dev-requirements.txt
    -e.
